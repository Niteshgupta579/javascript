<html>
    <head>
        <style>
            #cal{
                min-height: 400px;
                width: 400px;
                border-radius: 5px;
                box-shadow: 0px 0px 30px black inset;
                margin: 100px auto;
                padding: 25px;
                box-sizing: border-box;
                background: whitesmoke;
            }
            input{
                width: 100%;
                height: 50px;
                margin: 5px 0px;
                border-radius: 5px;
                border: none;
                box-shadow: 0px 0px 10px black inset;
            }
            button{
                height: 50px;
                width: 50px;
                border: none;
                border-radius: 5px;
                background: red;
                color: white;
                font-size: 30px;
            }
        </style>
    </head>
    <body>
        <div id ="cal">
            <p style="font-weight: bold; font-size: 24px; text-align: center; color: red;">Simple Calculator</p>
            <input type="number" id="t1" placeholder="enter the first number:"> <br>
            <input type="number" id="t2" placeholder="enter the second number"> <br>
            <p id ="msg"></p>
            <button onclick="add()">+</button>
            <button onclick="sub()">-</button>
            <button onclick="mul()">X</button>
            <button onclick="div()">/</button>
        </div>
        <Script>
            function add(){
                var d1 = document.querySelector("#t1");
                var d2 =document.querySelector("#t2");
                var d3 =parseFloat(d1.value)
                var d4 = parseFloat(d2.value)
                var add = (d3+d4).toFixed 

                var msg =document.querySelector("#msg")
                  msg.innerHTML = `<b>Total Number:${add}</b>` 
            }
             function sub(){
                var d1 = document.querySelector("#t1");
                var d2 =document.querySelector("#t2");
                var d3 =parseFloat(d1.value)
                var d4 = parseFloat(d2.value)
                var sub = (d3-d4).toFixed  
                var msg =document.querySelector("#msg")
                  msg.innerHTML = `<b>Total Number:${sub}</b>`  
            }
            function mul(){
                 var d1 = document.querySelector("#t1");
                var d2 =document.querySelector("#t2");
                var d3 =parseFloat(d1.value)
                var d4 = parseFloat(d2.value)
                var mul = (d3*d4).toFixed 
                
var msg =document.querySelector("#msg")
                  msg.innerHTML = `<b>Total Number:${mul}</b>`  

            }
             function div(){
                 var d1 = document.querySelector("#t1");
                var d2 =document.querySelector("#t2");
                var d3 =parseFloat(d1.value)
                var d4 = parseFloat(d2.value)
                var div = (d3/d4).toFixed 
                 var msg =document.querySelector("#msg")
                  msg.innerHTML = `<b>Total Number:${div}</b>`  

            }
        </Script>

    </body>
</html>

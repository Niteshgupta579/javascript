<html>
    <head>
        <style>
            #im{
                height: 500px;
                width: 500px;
                margin: 0px auto;
                border: 10px groove gray;
                box-shadow: 0px 0px 20px black inset;
            }
        </style>
    </head>
    <body> 
        <center> <h1>Slider By Techpile </h1>
        <img src="images/a.jpg"  id = "im" alt="abcd">
</center>
     <script>
        var arr=["images/a.jpg","images/b.jpg","images/c.jpg","images/d (1).jpg","images/d (1).webp"]
        var i=0
        //alert(arr[i])
        function slider(){
            var im = document.querySelector("#im")
            im.src=arr[i]
            i++
            if(i==5)
        {
            i=0
        }
           // alert("ok")
        }
        setInterval("slider()",1000)
     </script>  
    </body>
</html>
